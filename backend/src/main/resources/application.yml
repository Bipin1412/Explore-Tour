server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${MYSQL_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:explorer_tours;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
    username: ${MYSQL_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
    password: ${MYSQL_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-random-secret-key-for-jwt-signing}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
